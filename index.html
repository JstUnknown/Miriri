<!DOCTYPE html>
<html>


<head>


 <meta name="viewport" content="width=device-width, initial-scale=1.0">


 <title>Miriri Game 🐴</title>


 <style>
   body {
     background: #e8f5e9;
     display: flex;
     flex-direction: column;
     align-items: center;
     justify-content: center;
     margin: 0;
     height: 100vh;
   }


   canvas {
     background: white;
     border: 3px solid #4caf50;
     width: 95vw;
     max-width: 770px;
     height: auto;
     touch-action: none;
   }


   #score {
     font-size: 30px;
     font-family: Arial;
     margin: 10px;
   }
 </style>


</head>


<body>


 <div id="score">Score: 0</div>


 <canvas id="game" width="770" height="550"></canvas>


 <script>


   const canvas = document.getElementById("game");
   const ctx = canvas.getContext("2d");


   const size = 55;


   const scoreDisplay = document.getElementById("score");


   const tileCountX = Math.floor(canvas.width / size)
   const tileCountY = Math.floor(canvas.height / size)


   let gameOver = false;
   let score = 0;


   let horse = {
     x: 5 * size,
     y: 5 * size,
     dx: 0,
     dy: 0
   };


   let apple = {
     x: 2 * size,
     y: 2 * size
   };


   // SPRITES
   const sprites = [];
   for (let i = 0; i <= 4; i++) {
     const img = new Image();
     img.src = `assets/sprite_${i}.png`;
     sprites.push(img);
   }


   let frame = 0;
   let frameDelay = 0;
   let direction = "right";


   const appleImg = new Image()
   appleImg.src = "assets/maza3.png"


   function drawHorse() {


     ctx.save()


     ctx.translate(horse.x + size / 2, horse.y + size / 2)


     if (direction === "right") {
       ctx.drawImage(sprites[frame], -size / 2, -size / 2, size, size)
     }


     if (direction === "left") {
       ctx.scale(-1, 1)
       ctx.drawImage(sprites[frame], -size / 2, -size / 2, size, size)
     }


     if (direction === "up") {
       ctx.rotate(-Math.PI / 2)
       ctx.drawImage(sprites[frame], -size / 2, -size / 2, size, size)
     }


     if (direction === "down") {
       ctx.rotate(Math.PI / 2)
       ctx.drawImage(sprites[frame], -size / 2, -size / 2, size, size)
     }


     ctx.restore()


     if (horse.dx !== 0 || horse.dy !== 0) {
       frameDelay++


       if (frameDelay > 6) {
         frame++
         frameDelay = 0


         if (frame >= sprites.length) {
           frame = 0
         }
       }
     }


   }


   function drawApple() {
     ctx.drawImage(appleImg, apple.x, apple.y, size, size)
   }


   function moveMiriri() {


     horse.x += horse.dx
     horse.y += horse.dy


     if (
       horse.x < 0 ||
       horse.y < 0 ||
       horse.x >= tileCountX * size ||
       horse.y >= tileCountY * size
     ) {
       gameOver = true
     }


   }


   function checkApple() {


     if (horse.x === apple.x && horse.y === apple.y) {


       score++


       apple.x = Math.floor(Math.random() * tileCountX) * size
       apple.y = Math.floor(Math.random() * tileCountY) * size


     }


   }


   function drawScore() {
     scoreDisplay.textContent = "Score: " + score
   }


   function drawGameOver() {


     ctx.fillStyle = "rgba(0,0,0,0.6)"
     ctx.fillRect(0, 0, canvas.width, canvas.height)


     ctx.fillStyle = "white"
     ctx.font = "40px Arial"
     ctx.fillText("O miriri desmaiou", canvas.width / 2 - 150, canvas.height / 2)


     ctx.fillText("Pressione R para reiniciar", canvas.width / 2 - 215, canvas.height / 2 + 100)


   }


   function resetGame() {


     horse.x = 5 * size
     horse.y = 5 * size
     horse.dx = 0
     horse.dy = 0
     score = 0
     gameOver = false


   }


   function drawGrid() {


     ctx.strokeStyle = "#eeeeee"


     for (let x = 0; x < canvas.width; x += size) {
       ctx.beginPath()
       ctx.moveTo(x, 0)
       ctx.lineTo(x, canvas.height)
       ctx.stroke()
     }


     for (let y = 0; y < canvas.height; y += size) {
       ctx.beginPath()
       ctx.moveTo(0, y)
       ctx.lineTo(canvas.width, y)
       ctx.stroke()
     }


   }


   function moveUp() {
     horse.dx = 0
     horse.dy = -size
     direction = "up"
     moveMiriri()
     checkApple()
   }


   function moveDown() {
     horse.dx = 0
     horse.dy = size
     direction = "down"
     moveMiriri()
     checkApple()
   }


   function moveLeft() {
     horse.dx = -size
     horse.dy = 0
     direction = "left"
     moveMiriri()
     checkApple()
   }


   function moveRight() {
     horse.dx = size
     horse.dy = 0
     direction = "right"
     moveMiriri()
     checkApple()
   }


   function gameLoop() {


     ctx.clearRect(0, 0, canvas.width, canvas.height)


     if (gameOver) {
       drawGameOver()
     } else {
       drawHorse()
       drawApple()
       drawScore()
       drawGrid()
     }


     requestAnimationFrame(gameLoop)


   }


   // CONTROLE TECLADO
   document.addEventListener("keydown", e => {


     if (gameOver && (e.key === "r" || e.key === "R")) {
       resetGame()
     }


     if (!gameOver) {


       if (e.key === "w" || e.key === "W") {
         moveUp()
       }


       if (e.key === "s" || e.key === "S") {
         moveDown()
       }


       if (e.key === "a" || e.key === "A") {
         moveLeft()
       }


       if (e.key === "d" || e.key === "D") {
         moveRight()
       }


     }


   })


   // CONTROLE TOUCH
   canvas.addEventListener("touchstart", function (e) {


     e.preventDefault()


     const touch = e.touches[0]


     const rect = canvas.getBoundingClientRect()


     const touchX = touch.clientX - rect.left
     const touchY = touch.clientY - rect.top


     const centerX = horse.x + size / 2
     const centerY = horse.y + size / 2


     const dx = touchX - centerX
     const dy = touchY - centerY


     if (Math.abs(dx) > Math.abs(dy)) {


       if (dx > 0) {
         moveRight()
       } else {
         moveLeft()
       }


     } else {


       if (dy > 0) {
         moveDown()
       } else {
         moveUp()
       }


     }


   })




   setInterval(() => {


     if (!gameOver) {
       moveMiriri()
       checkApple()
     }


   }, 200)


   gameLoop()


 </script>


</body>


</html>

<!DOCTYPE html>
<html>
<head>
  <title>Miriri Game 🐴</title>
  <style>
    body {
      background: #e8f5e9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    canvas {
      background: white;
      border: 3px solid #4caf50;
    }
  </style>
</head>
<body>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const size = 20;

let horse = {
  x: 200,
  y: 200,
  speed: 2,
  dx: 2,
  dy: 0
};

let apple = {
  x: 100,
  y: 100
};

let score = 0;

function drawHorse() {
  ctx.fillStyle = "brown";
  ctx.fillRect(horse.x, horse.y, size, size);
}

function drawApple() {
  ctx.fillStyle = "red";
  ctx.fillRect(apple.x, apple.y, size, size);
}

function moveHorse() {
  horse.x += horse.dx;
  horse.y += horse.dy;

  // colisão com parede
  if (
    horse.x < 0 ||
    horse.y < 0 ||
    horse.x + size > canvas.width ||
    horse.y + size > canvas.height
  ) {
    alert("Bateu na parede 😭 Fim de jogo!");
    location.reload();
  }
}

function checkApple() {
  if (
    horse.x < apple.x + size &&
    horse.x + size > apple.x &&
    horse.y < apple.y + size &&
    horse.y + size > apple.y
  ) {
    score++;
    apple.x = Math.floor(Math.random() * 20) * size;
    apple.y = Math.floor(Math.random() * 20) * size;
  }
}

function drawScore() {
  ctx.fillStyle = "black";
  ctx.font = "16px Arial";
  ctx.fillText("Pontos: " + score, 10, 20);
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  moveHorse();
  checkApple();

  drawHorse();
  drawApple();
  drawScore();

  requestAnimationFrame(gameLoop);
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") { horse.dx = 0; horse.dy = -2; }
  if (e.key === "ArrowDown") { horse.dx = 0; horse.dy = 2; }
  if (e.key === "ArrowLeft") { horse.dx = -2; horse.dy = 0; }
  if (e.key === "ArrowRight") { horse.dx = 2; horse.dy = 0; }
});

gameLoop();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Miriri Game 🐴</title>
  <style>
    body {
      background: #e8f5e9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    canvas {
      background: white;
      border: 3px solid #4caf50;
    }
  </style>
</head>
<body>

<canvas id="game" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const size = 55;
    const tileCount = canvas.width / size;

    let gameOver = false;
    let score = 0;

    let horse = {
      x: 5 * size,
      y: 5 * size,
      dx: 0,
      dy: 0
    };

    let apple = {
      x: 8 * size,
      y: 8 * size
    };

    // ===== SPRITES =====
    const sprites = [];
    for (let i = 0; i <= 4; i++) { // AGORA vai até 4
      const img = new Image();
      img.src = `assets/sprite_${i}.png`;
      sprites.push(img);
    }

    let frame = 0;
    let frameDelay = 0;
    let direction = "right";
    // ====================

    function drawHorse() {

      ctx.save(); // salva estado do canvas

      // mover origem para o centro do cavalo
      ctx.translate(horse.x + size / 2, horse.y + size / 2);

      if (direction === "right") {
        // normal
        ctx.drawImage(sprites[frame], -size / 2, -size / 2, size, size);
      }

      if (direction === "left") {
        ctx.scale(-1, 1); // espelha horizontal
        ctx.drawImage(sprites[frame], -size / 2, -size / 2, size, size);
      }

      if (direction === "up") {
        ctx.rotate(-Math.PI / 2);
        ctx.drawImage(sprites[frame], -size / 2, -size / 2, size, size);
      }

      if (direction === "down") {
        ctx.rotate(Math.PI / 2);
        ctx.drawImage(sprites[frame], -size / 2, -size / 2, size, size);
      }

      ctx.restore(); // volta estado original

      // animação
      if (horse.dx !== 0 || horse.dy !== 0) {
        frameDelay++;
        if (frameDelay > 6) {
          frame++;
          frameDelay = 0;
          if (frame >= sprites.length) {
            frame = 0;
          }
        }
      }
    }
    
    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (gameOver) {
        drawGameOver();
      } else {
        drawHorse();
   
      }

      requestAnimationFrame(gameLoop);
    }
    document.addEventListener("keydown", e => {

      if (gameOver && (e.key === "r" || e.key === "R")) {
        resetGame();
      }

      if (!gameOver) {
        if (e.key === "w" || e.key === "W") {
          horse.dx = 0;
          horse.dy = -size;
          direction = "up";
        }

        if (e.key === "s" || e.key === "S") {
          horse.dx = 0;
          horse.dy = size;
          direction = "down";
        }

        if (e.key === "a" || e.key === "A") {
          horse.dx = -size;
          horse.dy = 0;
          direction = "left";
        }

        if (e.key === "d" || e.key === "D") {
          horse.dx = size;
          horse.dy = 0;
          direction = "right";
        }
      }
    });

    
    gameLoop()
    
</script>

</body>
</html>
